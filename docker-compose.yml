version: "3"
services:
  android-vibe:
    image: budtmo/docker-android:emulator_11.0
    container_name: android-vibe-coder
    privileged: true
    devices:
      - "/dev/kvm:/dev/kvm"
    ports:
      - "6080:6080"
      - "5554:5554"
      - "5555:5555"
    environment:
      - DEVICE=Samsung Galaxy S10
      - EMULATOR_ARCH=x86_64
      - EMULATOR_CPUS=4
      - EMULATOR_MEMORY=4096
      - WEB_VNC=true
    volumes:
      - ./:/home/androidusr/my-app
      
      # [THÊM DÒNG NÀY] Để lưu thư mục .ssh ra một kho riêng
      - vscode-ssh-data:/home/androidusr/.ssh
      
      # [KHUYÊN DÙNG THÊM] Để lưu các gói npm cài global (như claude-code) đỡ phải cài lại
      - vscode-node-modules:/home/androidusr/.npm-global

# [THÊM ĐOẠN NÀY Ở CUỐI FILE] Để khai báo các kho chứa
volumes:
  vscode-ssh-data:
  vscode-node-modules: