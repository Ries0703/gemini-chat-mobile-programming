version: "3"
services:
  android-vibe:
    image: budtmo/docker-android:emulator_11.0
    container_name: android-vibe-coder
    privileged: true
    devices:
      - "/dev/kvm:/dev/kvm"
    ports:
      - "6080:6080" # Web UI
      - "5554:5554"
      - "5555:5555"
    environment:
      - DEVICE=Samsung Galaxy S10
      - EMULATOR_ARCH=x86_64
      - EMULATOR_CPUS=4
      - EMULATOR_MEMORY=4096
      - WEB_VNC=true
    volumes:
      # QUAN TRỌNG: Đổi từ /root/my-app sang đường dẫn home của user androidusr
      # Nếu không bạn sẽ bị lỗi "Permission denied" khi sửa file
      - ./:/home/androidusr/my-app
    
    # Không cần override command ở đây, hãy để Dev Container lo việc cài Node/Claude